<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OD | Studio – Planning and Design Solutions</title>

  <!-- Bulma -->
  <link href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  
  <!-- Your Font -->  
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:400;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
</head>

<body>

  <!-- HEADER -->
  <header id="site-header"></header>

  <!-- MAIN CONTENT -->
  <main id="site-sections"></main>

  <!-- FOOTER -->
  <footer id="site-footer"></footer>

  <!-- ------------------------
       INITIAL COMPONENT LOAD
       (REQUIRED for SPA to work)
  ------------------------ -->
  <script>
    function loadComponent(id, file, callback) {
      fetch(file)
        .then(res => res.text())
        .then(html => {
          document.getElementById(id).innerHTML = html;
          if (callback) callback();
        })
        .catch(err => console.error(`Error loading ${file}`, err));
    }

    // Load header → THEN init nav (important)
    loadComponent("site-header", "components/header.html", () => {
      if (window.initNav) window.initNav();
    });

    // Load landing page
    loadComponent("site-sections", "components/1_landing.html");

    // Load footer
    loadComponent("site-footer", "components/footer.html");
  </script>

  <!-- MAIN JS (navigation, gallery, etc.) -->
  <script src="assets/js/main.js"></script>

</body>
</html>
