<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OD | Studio – Planning and Design Solutions</title>

  <!-- Bulma CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <!-- HEADER -->
  <header id="site-header"></header>

  <!-- MAIN CONTENT (SPA container) -->
  <main id="site-sections"></main>

  <!-- FOOTER -->
  <footer id="site-footer"></footer>

  <!-- Component Loader -->
 <script>
  function loadComponent(id, file, callback) {
    fetch(file)
      .then(res => res.text())
      .then(html => {
        document.getElementById(id).innerHTML = html;
        if (callback) callback(); // 🔑 call after load
      })
      .catch(err => console.error(`Error loading ${file}`, err));
  }

  // HEADER → nav init after it loads
  loadComponent("site-header", "components/header.html", () => {
    if (window.initNav) window.initNav();
  });

  // MAIN CONTENT
  loadComponent("site-sections", "components/1_landing.html");

  // FOOTER
  loadComponent("site-footer", "components/footer.html");
  </script>

  <!-- SPA JS -->
  <script src="assets/js/main.js"></script>

</body>
</html>
